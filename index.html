<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tushar Clock</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<!-- Favicons -->
 <link rel="icon" href="icon.png">

<!-- BACKGROUND -->
<div id="scene"></div>

<!-- MAIN UI -->
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 text-center main-card">

<hr>

  <h5>📋 Tasks</h5>

  <div class="d-flex mb-2">
  <input id="taskInput" type="text" class="form-control me-2" placeholder="Enter task...">
  <button id="addTask" class="btn btn-success">Add</button>
  </div>

  <ul id="taskList" class="list-group mb-2"></ul>

 <div class="progress mb-2">
  <div id="progressBar" class="progress-bar bg-success" style="width: 0%"></div>
</div>
<p id="progressText">0%</p>
<p id="dailyStats">Today: 0/0 completed</p>
<hr>

<h5>⏰ Schedule</h5>

<div class="d-flex mb-2">
  <input id="timeInput" type="time" class="form-control me-2">
  <input id="scheduleInput" type="text" class="form-control me-2" placeholder="Task...">
  <button id="addSchedule" class="btn btn-success">Add</button>
</div>

<ul id="scheduleList" class="list-group mb-2"></ul>

    <h1 id="time">00:00:00</h1>
    <p id="date"></p>

    <div>
      <span id="weatherIcon">⏳</span>
      <span id="weatherText">Loading...</span>
    </div>

    <p id="status"></p>

    <button id="toggleFormat" class="btn btn-primary m-1">Toggle Format</button>
    <button id="toggleTheme" class="btn btn-dark m-1">Toggle Theme</button>
    <button id="stopAlarm" class="btn btn-danger m-1" style="display: none;">Stop Alarm</button>

  </div>
</div>


<script src="js/clock.js"></script>
<script src="js/theme.js"></script>
<script src="js/tasks.js"></script>
<script src="js/schedule.js"></script>
<script src="js/weather.js"></script>
<script src="js/notify.js"></script>
<script src="js/alarm.js"></script>
<script src="js/main.js"></script>
</body>
</html>
