<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tushar Clock</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<!-- BACKGROUND -->
<div id="scene"></div>

<!-- MAIN UI -->
<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 text-center main-card">

    <h1 id="time">00:00:00</h1>
    <p id="date"></p>

    <div>
      <span id="weatherIcon">⏳</span>
      <span id="weatherText">Loading...</span>
    </div>

    <p id="status"></p>

    <button id="toggleFormat" class="btn btn-primary m-1">Toggle Format</button>
    <button id="toggleTheme" class="btn btn-dark m-1">Toggle Theme</button>

  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
